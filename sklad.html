<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Остатки склада (г.Протвино)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); 
            color: #1e293b; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .card-shadow { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-shadow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        /* Scale down everything slightly */
        html { font-size: 14px; overflow-x: hidden; }
        @media (max-width: 640px) {
            html { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbwvLFxmyUUMYgRkWYlBYUDtt4niXGS8O2LxOmtRb0m0IP56khr65sAX5antBOZzO_n7/exec";

        function App() {
            const [activeTab, setActiveTab] = useState('paints');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [search, setSearch] = useState('');

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(GAS_URL);
                    const json = await response.json();
                    setData(json);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const formatNumber = (val, decimals = 2) => {
                if (val === undefined || val === null || val === "") return "—";
                const str = String(val).replace(/\s/g, '').replace(',', '.');
                const num = parseFloat(str);
                if (isNaN(num)) return val;
                
                return new Intl.NumberFormat('ru-RU', { 
                    minimumFractionDigits: 0, 
                    maximumFractionDigits: decimals 
                }).format(num).replace(',', '.');
            };

            useEffect(() => { fetchData(); }, []);

            const filtered = data ? data[activeTab]
                .filter(g => g.category && g.category.trim() !== "" && g.category !== "БЕЗ КАТЕГОРИИ")
                .map(g => ({
                    ...g,
                    items: g.items.filter(i => {
                        const hasBalance = i.balance && String(i.balance).trim() !== "";
                        const isNotHeader = i.name && i.name.trim() !== "" && i.name !== g.category;
                        const matchesSearch = (i.name.toLowerCase().includes(search.toLowerCase()) || 
                                             String(i.code).toLowerCase().includes(search.toLowerCase()));
                        return hasBalance && isNotHeader && matchesSearch;
                    })
                })).filter(g => g.items.length > 0) : [];

            const calculateExtrusionTotal = () => {
                if (!data || activeTab !== 'materials') return 0;
                const categoriesToSum = ["Материалы", "Добавки", "Сырье с г. Донецка", "Вторичка г. Протвино", "Сырьё из г.Донецка", "Вторичка, г.Протвино"];
                let total = 0;
                data.materials.forEach(group => {
                    if (categoriesToSum.includes(group.category)) {
                        group.items.forEach(item => {
                            const hasBalance = item.balance && String(item.balance).trim() !== "";
                            const isNotHeader = item.name && item.name.trim() !== "" && item.name !== group.category;
                            
                            if (hasBalance && isNotHeader) {
                                const balanceStr = String(item.balance).replace(/\s/g, '').replace(',', '.');
                                const balanceNum = parseFloat(balanceStr);
                                if (!isNaN(balanceNum)) {
                                    total += balanceNum;
                                }
                            }
                        });
                    }
                });
                return total;
            };

            const extrusionTotal = calculateExtrusionTotal();

            return (
                <div className="min-h-screen flex flex-col pb-12">
                    {/* Sticky Header & Navigation Wrapper */}
                    <div className="glass sticky top-0 z-50 border-b border-slate-200/60 shadow-md">
                        {/* Header */}
                        <header className="px-3 md:px-6 py-2 md:py-4 flex flex-col md:flex-row justify-between items-center gap-2 md:gap-6">
                            <div className="flex items-center justify-between w-full md:w-auto">
                                <div className="flex items-center gap-2 md:gap-4">
                                    <div className="w-8 h-8 md:w-12 md:h-12 bg-gradient-to-br from-indigo-600 to-violet-700 rounded-lg md:rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200 ring-2 md:ring-4 ring-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="md:w-6 md:h-6"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                    </div>
                                    <div>
                                        <h1 className="text-sm md:text-2xl font-extrabold text-slate-900 tracking-tight leading-none mb-0.5 md:mb-1">Склад (Протвино)</h1>
                                        <p className="text-[7px] md:text-xs font-bold text-indigo-600 uppercase tracking-[0.15em] md:tracking-[0.2em]">ООО Империал РУС</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={fetchData} 
                                    className="md:hidden p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-all shadow-sm active:scale-95 flex items-center justify-center group"
                                    title="Обновить данные"
                                >
                                    <svg className={`w-4 h-4 text-slate-600 group-hover:text-indigo-600 transition-colors ${loading ? 'animate-spin' : ''}`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                                </button>
                            </div>

                            <div className="flex gap-2 w-full md:w-auto">
                                <div className="relative w-full md:w-80 group">
                                    <div className="absolute inset-y-0 left-0 pl-3 md:pl-4 flex items-center pointer-events-none">
                                        <svg className="h-3.5 w-3.5 md:h-5 md:w-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Поиск..." 
                                        className="w-full bg-slate-100/50 border border-slate-200 rounded-lg md:rounded-2xl pl-8 md:pl-11 pr-4 py-1.5 md:py-3 text-xs md:text-base focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                    />
                                </div>
                                <button 
                                    onClick={fetchData} 
                                    className="hidden md:flex p-3 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 hover:border-indigo-200 transition-all shadow-sm active:scale-95 items-center justify-center group"
                                    title="Обновить данные"
                                >
                                    <svg className={`w-6 h-6 text-slate-600 group-hover:text-indigo-600 transition-colors ${loading ? 'animate-spin' : ''}`} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                                </button>
                            </div>
                        </header>

                        {/* Navigation */}
                        <div className="px-3 md:px-6 pb-2 md:pb-4">
                            <div className="bg-slate-200/60 p-0.5 md:p-1 rounded-lg md:rounded-[22px] flex gap-0.5 md:gap-1 max-w-md mx-auto md:mx-0 shadow-inner">
                                <button 
                                    onClick={() => setActiveTab('paints')}
                                    className={`flex-1 py-1.5 md:py-3 text-[10px] md:text-sm font-bold uppercase tracking-widest rounded-md md:rounded-[16px] transition-all duration-300 ${activeTab === 'paints' ? 'bg-white text-indigo-600 shadow-sm md:shadow-md scale-[1.01] md:scale-[1.02]' : 'text-slate-500 hover:text-slate-700 hover:bg-white/40'}`}
                                >
                                    Краски
                                </button>
                                <button 
                                    onClick={() => setActiveTab('materials')}
                                    className={`flex-1 py-1.5 md:py-3 text-[10px] md:text-sm font-bold uppercase tracking-widest rounded-md md:rounded-[16px] transition-all duration-300 ${activeTab === 'materials' ? 'bg-white text-indigo-600 shadow-sm md:shadow-md scale-[1.01] md:scale-[1.02]' : 'text-slate-500 hover:text-slate-700 hover:bg-white/40'}`}
                                >
                                    Материалы
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="px-4 md:px-6 mt-6 md:mt-10 flex-1">
                        {activeTab === 'materials' && extrusionTotal > 0 && !search && (
                            <div className="mb-8 md:mb-10 bg-gradient-to-r from-indigo-600 to-violet-700 rounded-3xl md:rounded-[32px] p-6 md:p-10 text-white shadow-2xl shadow-indigo-200 flex flex-col md:flex-row justify-between items-center gap-6 md:gap-8 max-w-5xl mx-auto md:mx-0 border border-white/10 relative overflow-hidden">
                                <div className="absolute top-0 right-0 -mt-8 -mr-8 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
                                <div className="absolute bottom-0 left-0 -mb-8 -ml-8 w-48 h-48 bg-indigo-400/20 rounded-full blur-3xl"></div>
                                
                                <div className="flex items-center gap-4 md:gap-6 relative z-10">
                                    <div className="w-14 h-14 md:w-20 md:h-20 bg-white/20 backdrop-blur-md rounded-2xl md:rounded-3xl flex items-center justify-center ring-1 ring-white/30 shadow-inner shrink-0">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="md:w-10 md:h-10"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                    </div>
                                    <div>
                                        <h2 className="text-xl md:text-3xl font-black leading-tight mb-1 md:mb-2">Вес сырья для экструзии</h2>
                                        <p className="text-[10px] md:text-sm font-bold text-indigo-100/90 uppercase tracking-[0.1em] md:tracking-[0.15em]">Материалы, Добавки, Сырьё из г.Донецка и Вторичка, г.Протвино</p>
                                    </div>
                                </div>
                                <div className="text-center md:text-right relative z-10">
                                    <div className="text-4xl md:text-6xl font-black font-mono tracking-tighter mb-0.5 md:mb-1 drop-shadow-lg">
                                        {formatNumber(extrusionTotal, 1)}
                                    </div>
                                    <div className="text-[10px] md:text-base font-black uppercase text-indigo-200 tracking-[0.3em] md:tracking-[0.4em]">килограмм</div>
                                </div>
                            </div>
                        )}
                        
                        {loading && !data ? (
                            <div className="flex flex-col items-center justify-center py-48">
                                <div className="w-20 h-20 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-8"></div>
                                <p className="text-base font-black text-slate-400 uppercase tracking-[0.4em]">Синхронизация данных...</p>
                            </div>
                        ) : error && !data ? (
                            <div className="max-w-lg mx-auto bg-white border border-red-100 rounded-[40px] p-16 text-center shadow-2xl">
                                <div className="w-24 h-24 bg-red-50 text-red-500 rounded-[32px] flex items-center justify-center mx-auto mb-10 shadow-inner">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                </div>
                                <h3 className="text-2xl font-black text-slate-900 mb-4">Ошибка подключения</h3>
                                <p className="text-lg text-slate-500 mb-12 leading-relaxed">{error}</p>
                                <button onClick={fetchData} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-200 active:scale-95">Повторить попытку</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-10">
                                {filtered.map(group => (
                                    <div key={group.category} className="bg-white rounded-2xl md:rounded-[32px] overflow-hidden card-shadow border border-slate-200/70 flex flex-col">
                                        <div className="bg-slate-50/90 px-5 md:px-8 py-4 md:py-6 border-b border-slate-100 flex justify-between items-center">
                                            <h2 className="text-base md:text-lg font-black text-slate-800 uppercase tracking-tight truncate pr-4">{group.category}</h2>
                                            <span className="text-xs md:text-sm font-black bg-indigo-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-xl md:rounded-2xl shrink-0 shadow-lg shadow-indigo-100">{group.items.length}</span>
                                        </div>
                                        <div className="flex-1 custom-scrollbar overflow-y-auto overflow-x-hidden max-h-[500px] md:max-h-[650px]">
                                            <table className="w-full text-left border-collapse table-fixed">
                                                <thead className="sticky top-0 z-10">
                                                    <tr className="bg-slate-50/95 backdrop-blur-md border-b border-slate-100">
                                                        <th className="w-[65px] md:w-[80px] pl-4 md:pl-8 py-3 md:py-5 text-[9px] md:text-[12px] font-black uppercase text-slate-400 tracking-widest">Код</th>
                                                        <th className="py-3 md:py-5 text-[9px] md:text-[12px] font-black uppercase text-slate-400 tracking-widest">Наименование</th>
                                                        <th className="w-[85px] md:w-[120px] pr-4 md:pr-8 py-3 md:py-5 text-[9px] md:text-[12px] font-black uppercase text-slate-400 tracking-widest text-right">Остаток</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {group.items.map((item, i) => (
                                                        <tr key={i} className="hover:bg-indigo-50/40 transition-colors border-b border-slate-50 last:border-0 group/row">
                                                            <td className="pl-4 md:pl-8 py-3 md:py-6 text-[11px] md:text-sm font-mono text-slate-400 group-hover/row:text-indigo-500 transition-colors truncate">{item.code || "—"}</td>
                                                            <td className="py-3 md:py-6 pr-2">
                                                                 <div className="text-[13px] md:text-base font-bold text-slate-700 leading-tight group-hover/row:text-slate-900 transition-colors break-words">{item.name}</div>
                                                            </td>
                                                            <td className="pr-4 md:pr-8 py-3 md:py-6 text-right">
                                                                <div className="flex flex-col items-end">
                                                                    <span className="text-sm md:text-lg font-black text-slate-900 font-mono tracking-tighter group-hover/row:text-indigo-600 transition-colors">
                                                                        {formatNumber(item.balance)}
                                                                    </span>
                                                                    <span className="text-[8px] md:text-[11px] font-black text-indigo-500 uppercase tracking-[0.1em] md:tracking-[0.2em]">{item.unit}</span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
