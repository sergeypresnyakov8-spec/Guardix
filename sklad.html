<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexoPrint | Склад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbwvLFxmyUUMYgRkWYlBYUDtt4niXGS8O2LxOmtRb0m0IP56khr65sAX5antBOZzO_n7/exec";

        function App() {
            const [activeTab, setActiveTab] = useState('paints');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [search, setSearch] = useState('');

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(GAS_URL);
                    const json = await response.json();
                    setData(json);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const filtered = data ? data[activeTab]
                .filter(g => g.category && g.category.trim() !== "" && g.category !== "БЕЗ КАТЕГОРИИ")
                .map(g => ({
                    ...g,
                    items: g.items.filter(i => {
                        const hasBalance = i.balance && String(i.balance).trim() !== "";
                        const isNotHeader = i.name && i.name.trim() !== "" && i.name !== g.category;
                        const matchesSearch = (i.name.toLowerCase().includes(search.toLowerCase()) || 
                                             String(i.code).toLowerCase().includes(search.toLowerCase()));
                        return hasBalance && isNotHeader && matchesSearch;
                    })
                })).filter(g => g.items.length > 0) : [];

            const calculateExtrusionTotal = () => {
                if (!data || activeTab !== 'materials') return 0;
                const categoriesToSum = ["Материалы", "Добавки", "Сырье с г. Донецка", "Вторичка г. Протвино", "Сырьё из г.Донецка", "Вторичка, г.Протвино"];
                let total = 0;
                data.materials.forEach(group => {
                    if (categoriesToSum.includes(group.category)) {
                        group.items.forEach(item => {
                            // Применяем те же фильтры, что и для отображения, чтобы избежать задвоения (например, если в списке есть строка-итог)
                            const hasBalance = item.balance && String(item.balance).trim() !== "";
                            const isNotHeader = item.name && item.name.trim() !== "" && item.name !== group.category;
                            
                            if (hasBalance && isNotHeader) {
                                const balanceStr = String(item.balance).replace(/\s/g, '').replace(',', '.');
                                const balanceNum = parseFloat(balanceStr);
                                if (!isNaN(balanceNum)) {
                                    total += balanceNum;
                                }
                            }
                        });
                    }
                });
                return total;
            };

            const extrusionTotal = calculateExtrusionTotal();

            return (
                <div className="min-h-screen flex flex-col pb-12">
                    {/* Header */}
                    <header className="glass sticky top-0 z-30 border-b border-slate-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-900 leading-tight">Складской учет</h1>
                                <p className="text-[10px] font-semibold text-indigo-600 uppercase tracking-wider">FlexoPrint Logistics</p>
                            </div>
                        </div>

                        <div className="flex gap-2 w-full md:w-auto">
                            <div className="relative w-full md:w-72">
                                <input 
                                    type="text" 
                                    placeholder="Поиск по названию..." 
                                    className="w-full bg-slate-100 border-none rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400"
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                />
                            </div>
                            <button 
                                onClick={fetchData} 
                                className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all shadow-sm active:scale-95"
                                title="Обновить данные"
                            >
                                <svg className={`w-5 h-5 text-slate-600 ${loading ? 'animate-spin' : ''}`} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                            </button>
                        </div>
                    </header>

                    {/* Navigation */}
                    <div className="px-6 mt-6">
                        <div className="bg-slate-200/50 p-1 rounded-2xl flex gap-1 max-w-md mx-auto md:mx-0">
                            <button 
                                onClick={() => setActiveTab('paints')}
                                className={`flex-1 py-2.5 text-xs font-bold uppercase tracking-widest rounded-xl transition-all ${activeTab === 'paints' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                Краски
                            </button>
                            <button 
                                onClick={() => setActiveTab('materials')}
                                className={`flex-1 py-2.5 text-xs font-bold uppercase tracking-widest rounded-xl transition-all ${activeTab === 'materials' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                Материалы
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="px-6 mt-8 flex-1">
                        {activeTab === 'materials' && extrusionTotal > 0 && !search && (
                            <div className="mb-8 bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-100 flex flex-col md:flex-row justify-between items-center gap-4 max-w-4xl mx-auto md:mx-0">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-bold leading-tight">Вес сырья для экструзии</h2>
                                        <p className="text-[10px] font-medium text-indigo-100 uppercase tracking-wider">Материалы, Добавки, Сырьё из г.Донецка и Вторичка, г.Протвино</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <div className="text-3xl font-bold font-mono">{extrusionTotal.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 })}</div>
                                    <div className="text-xs font-bold uppercase text-indigo-200">кг</div>
                                </div>
                            </div>
                        )}
                        {loading && !data ? (
                            <div className="flex flex-col items-center justify-center py-32">
                                <div className="w-12 h-12 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                                <p className="text-xs font-medium text-slate-400 uppercase tracking-widest">Загрузка данных...</p>
                            </div>
                        ) : error && !data ? (
                            <div className="max-w-md mx-auto bg-white border border-red-100 rounded-3xl p-10 text-center card-shadow">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                </div>
                                <h3 className="text-lg font-bold text-slate-900 mb-2">Ошибка подключения</h3>
                                <p className="text-sm text-slate-500 mb-8">{error}</p>
                                <button onClick={fetchData} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">Повторить</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">
                                {filtered.map(group => (
                                    <div key={group.category} className="bg-white rounded-3xl overflow-hidden card-shadow border border-slate-100 flex flex-col">
                                        <div className="bg-slate-50/80 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                                            <h2 className="text-sm font-bold text-slate-800 uppercase tracking-tight truncate pr-4">{group.category}</h2>
                                            <span className="text-[10px] font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded-lg shrink-0">{group.items.length}</span>
                                        </div>
                                        <div className="flex-1">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-50/30">
                                                        <th className="pl-6 py-3 text-[9px] font-bold uppercase text-slate-400 tracking-wider">Код</th>
                                                        <th className="px-3 py-3 text-[9px] font-bold uppercase text-slate-400 tracking-wider">Название</th>
                                                        <th className="pr-6 py-3 text-[9px] font-bold uppercase text-slate-400 tracking-wider text-right">Остаток</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {group.items.map((item, i) => (
                                                        <tr key={i} className="hover:bg-slate-50/50 transition-all border-b border-slate-50 last:border-0">
                                                            <td className="pl-6 py-3.5 text-[11px] font-mono text-slate-400">{item.code || "—"}</td>
                                                            <td className="px-3 py-3.5">
                                                                 <div className="text-xs font-semibold text-slate-700 leading-snug">{item.name}</div>
                                                            </td>
                                                            <td className="pr-6 py-3.5 text-right">
                                                                <div className="flex flex-col items-end">
                                                                    <span className="text-sm font-bold text-slate-900 font-mono">{item.balance}</span>
                                                                    <span className="text-[9px] font-bold text-indigo-400 uppercase">{item.unit}</span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
